<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday 🎉❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', serif;
      width: 100vw;
      height: 100vh;
    }
    canvas { display: block; }

    /* ── Intro screen ── */
    #intro {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }
    #intro.hidden { opacity: 0; visibility: hidden; }

    #btn {
      padding: 20px 60px;
      font-size: clamp(1.3rem, 5vw, 1.9rem);
      font-family: 'Georgia', serif;
      letter-spacing: 0.2em;
      color: #fff;
      background: transparent;
      border: 2px solid #ff0066;
      border-radius: 50px;
      cursor: pointer;
      outline: none;
      box-shadow: 0 0 20px #ff0066, 0 0 50px #ff0066, inset 0 0 20px rgba(255,0,102,0.1);
      text-shadow: 0 0 15px #ff66aa, 0 0 35px #ff0066;
      animation: btnPulse 1.6s ease-in-out infinite;
    }
    #btn:active { transform: scale(0.95); }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 20px #ff0066, 0 0 50px #ff0066, inset 0 0 20px rgba(255,0,102,0.1); }
      50%       { box-shadow: 0 0 40px #ff0066, 0 0 100px #ff0066, 0 0 140px #cc0055, inset 0 0 30px rgba(255,0,102,0.2); }
    }

    /* ── UI overlay ── */
    #ui {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 30px;
    }
    #title {
      color: #fff;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px #ff4488, 0 0 40px #ff0066;
      animation: pulse 2s ease-in-out infinite;
      text-align: center;
    }
    #subtitle {
      color: #ff88cc;
      font-size: clamp(0.8rem, 3vw, 1.1rem);
      letter-spacing: 0.15em;
      margin-top: 8px;
      text-shadow: 0 0 10px #ff0066;
      animation: pulse 2.5s ease-in-out infinite;
      text-align: center;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── Floating hearts ── */
    .heart-overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; overflow: hidden;
    }
    .fheart {
      position: absolute;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.5); opacity: 0.9; }
      100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="intro">
  <button id="btn" onclick="startAnimation()">нажми</button>
</div>

<div class="heart-overlay" id="heartsOverlay"></div>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">✨ HAPPY BIRTHDAY ✨</div>
  <div id="subtitle">❤️ С Днём Рождения Машенька, Я Люблю Тебя ❤️</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Scene ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 18);
camera.lookAt(0, 1, 0);
// ── Lights ─────────────────────────────────────────────────────
const ambLight = new THREE.AmbientLight(0xff0055, 0.3);
scene.add(ambLight);
const pinkLight = new THREE.PointLight(0xff1177, 3, 30);
pinkLight.position.set(0, 6, 5);
scene.add(pinkLight);
const purpleLight = new THREE.PointLight(0x8800ff, 2, 25);
purpleLight.position.set(-5, 2, 0);
scene.add(purpleLight);

// ── Stars ──────────────────────────────────────────────────────
(function() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(3000 * 3);
  for (let i = 0; i < pos.length; i++) pos[i] = (Math.random() - 0.5) * 200;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.7 })));
})();

// ── Ambient particles ──────────────────────────────────────────
const ambParticles = (() => {
  const geo = new THREE.BufferGeometry();
  const count = 600;
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = 12 + Math.random() * 10;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta) - 2;
    pos[i*3+2] = r * Math.cos(phi);
    col[i*3] = 1; col[i*3+1] = 0.1 + Math.random()*0.4; col[i*3+2] = 0.5 + Math.random()*0.5;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({ vertexColors: true, size: 0.12, transparent: true, opacity: 0.6 }));
})();
scene.add(ambParticles);

// ── Planet ─────────────────────────────────────────────────────
const planet = new THREE.Mesh(
  new THREE.SphereGeometry(5, 64, 64),
  new THREE.MeshPhongMaterial({ color: 0x0a0015, emissive: 0x1a0030, shininess: 30, transparent: true, opacity: 0.92 })
);
planet.position.y = -3;
scene.add(planet);

const ring = new THREE.Mesh(
  new THREE.TorusGeometry(6.5, 0.18, 16, 120),
  new THREE.MeshPhongMaterial({ color: 0xff0066, emissive: 0xff0044, shininess: 80 })
);
ring.rotation.x = Math.PI / 4;
ring.position.y = -3;
scene.add(ring);

const ring2 = new THREE.Mesh(
  new THREE.TorusGeometry(7.2, 0.07, 8, 100),
  new THREE.MeshBasicMaterial({ color: 0xcc0088, transparent: true, opacity: 0.5 })
);
ring2.rotation.x = Math.PI / 3.5;
ring2.position.y = -3;
scene.add(ring2);

// Surface dust
(function() {
  const geo = new THREE.BufferGeometry();
  const count = 1200;
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    const r = 5.05;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.cos(phi);
    pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const t = Math.random();
    col[i*3] = 1; col[i*3+1] = t*0.3; col[i*3+2] = 0.5+t*0.5;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  planet.add(new THREE.Points(geo, new THREE.PointsMaterial({ vertexColors: true, size: 0.06, transparent: true, opacity: 0.8 })));
})();

// ── Orbiting text labels ────────────────────────────────────────
function makeTextSprite(text, isBirthday) {
  const cv = document.createElement('canvas');
  cv.width = 700; cv.height = 110;
  const ctx = cv.getContext('2d');

  // completely transparent background
  ctx.clearRect(0, 0, 700, 110);

  const glowColor = isBirthday ? '#ff0077' : '#bb00ff';
  const mainColor = isBirthday ? '#ffccee' : '#eeccff';

  ctx.font = 'bold 46px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // glow layers
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 50;
  ctx.fillStyle = glowColor;
  ctx.fillText(text, 350, 55);
  ctx.shadowBlur = 28;
  ctx.fillStyle = mainColor;
  ctx.fillText(text, 350, 55);

  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, 350, 55);

  const tex = new THREE.CanvasTexture(cv);
  tex.premultiplyAlpha = false;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(5.8, 0.9, 1);
  return sprite;
}

const orbitGroup = new THREE.Group();
orbitGroup.position.y = -3;
scene.add(orbitGroup);

const totalLabels = 12;
for (let i = 0; i < totalLabels; i++) {
  const isBirthday = (i % 2 === 0);
  const text = isBirthday ? 'С ДНЁМ РОЖДЕНИЯ' : 'Я ЛЮБЛЮ ТЕБЯ';
  const sprite = makeTextSprite(text, isBirthday);

  const tier = i % 3;
  const r = 6.1 + tier * 0.65;
  const angle = (i / totalLabels) * Math.PI * 2;
  const yOff = -1.8 + tier * 1.6 + (Math.random() - 0.5) * 0.5;

  sprite.position.set(r * Math.cos(angle), yOff, r * Math.sin(angle));
  sprite.userData = { angle, r, yOff, speed: 0.003 + (i % 3) * 0.001 };
  orbitGroup.add(sprite);
}

// ── Heart ──────────────────────────────────────────────────────
function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return [x*0.06, y*0.06];
}

const heartGroup = new THREE.Group();
heartGroup.position.set(0, 5.5, 0);
scene.add(heartGroup);

(function() {
  const count = 2500;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3), col = new Float32Array(count*3);
  for (let i = 0; i < count; i++) {
    const t = (i/count)*Math.PI*2;
    const [hx,hy] = heartPoint(t);
    pos[i*3]=hx+(Math.random()-.5)*.05; pos[i*3+1]=hy+(Math.random()-.5)*.05; pos[i*3+2]=(Math.random()-.5)*.15;
    const b = 0.7+Math.random()*.3;
    col[i*3]=b; col[i*3+1]=0.05*b; col[i*3+2]=0.4*b;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  heartGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({ vertexColors:true, size:0.06, transparent:true, opacity:0.95 })));
})();

(function() {
  const count = 3000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3), col = new Float32Array(count*3);
  for (let i = 0; i < count; i++) {
    const t = Math.random()*Math.PI*2;
    const [hx,hy] = heartPoint(t);
    const rx=(Math.random()-.5)*2, ry=(Math.random()-.5)*2;
    pos[i*3]=hx*rx; pos[i*3+1]=hy*ry; pos[i*3+2]=(Math.random()-.5)*.1;
    const t2=Math.random();
    col[i*3]=0.9-t2*.3; col[i*3+1]=0.02; col[i*3+2]=0.3+t2*.3;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  heartGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({ vertexColors:true, size:0.04, transparent:true, opacity:0.6 })));
})();

(function() {
  const geo = new THREE.CylinderGeometry(0.05, 0.5, 8, 16, 1, true);
  const beam = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color:0xff0055, transparent:true, opacity:0.15, side:THREE.DoubleSide }));
  beam.position.set(0, 1.5, 0);
  scene.add(beam);
})();

// ── Floating hearts ────────────────────────────────────────────
const overlay = document.getElementById('heartsOverlay');
const heartEmojis = ['❤️','💕','💗','💖','💓','🌹'];
function spawnHeart() {
  const el = document.createElement('div');
  el.className = 'fheart';
  el.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
  el.style.left = Math.random()*100 + 'vw';
  el.style.top = '100vh';
  const dur = 4 + Math.random()*5;
  el.style.animationDuration = dur + 's';
  el.style.fontSize = (1+Math.random()*2) + 'rem';
  overlay.appendChild(el);
  setTimeout(() => el.remove(), dur*1000);
}

// ── Intro button ───────────────────────────────────────────────
function startAnimation() {
  document.getElementById('intro').classList.add('hidden');
  setInterval(spawnHeart, 400);
}
// ── Resize ─────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animate ────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.008;

  planet.rotation.y += 0.003;
  ring.rotation.z += 0.004;
  ring2.rotation.z -= 0.002;
  orbitGroup.rotation.y += 0.002;

  orbitGroup.children.forEach(sprite => {
    sprite.userData.angle += sprite.userData.speed;
    const a = sprite.userData.angle;
    sprite.position.set(
      sprite.userData.r * Math.cos(a),
      sprite.userData.yOff,
      sprite.userData.r * Math.sin(a)
    );
  });

  const scale = 1 + 0.06*Math.sin(t*2.5);
  heartGroup.scale.set(scale, scale, scale);
  heartGroup.position.y = 5.5 + 0.3*Math.sin(t*0.8);
  heartGroup.rotation.y += 0.005;

  pinkLight.intensity = 2.5 + 1.5*Math.sin(t*2);
  purpleLight.intensity = 1.5 + 0.8*Math.cos(t*1.7);
  ambParticles.rotation.y += 0.001;
  ambParticles.rotation.x += 0.0003;

  camera.position.y = 4 + 0.4*Math.sin(t*0.3);
  camera.lookAt(0, 2, 0);

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
